# Starship prompt — backend/infra focused
# Shows: directory, git branch/status, python venv, go version, k8s context, command duration

format = """
$directory\
$git_branch\
$git_status\
$python\
$golang\
$kubernetes\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
style = "bold yellow"

[golang]
format = "[$symbol($version )]($style)"
symbol = " "
style = "bold cyan"

[kubernetes]
disabled = false
format = '[$symbol$context(\[$namespace\])]($style) '
symbol = "⎈ "
style = "bold blue"
# Only show k8s context when KUBECONFIG is set or kubectl is in use
detect_files = ["*.yaml", "*.yml", "Dockerfile", "docker-compose.yml"]

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[aws]
disabled = true

[gcloud]
disabled = true
